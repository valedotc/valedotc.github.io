<section id="hero" class="hero">
  <!-- Engineering grid -->
  <div class="hero__grid" aria-hidden="true"></div>

  <!-- Scan line -->
  <div class="hero__scan" aria-hidden="true"></div>

  <!-- Warm glow orbs -->
  <div class="hero__orb hero__orb--1" aria-hidden="true"></div>
  <div class="hero__orb hero__orb--2" aria-hidden="true"></div>

  <div class="container hero__content">

    <div class="hero__badge">
      <span class="badge-dot"></span>
      Available for opportunities
    </div>

    <h1 class="hero__name">
      {{ data.name }}
    </h1>

    <div class="hero__role">
      <span class="role-text">{{ displayedText() }}</span>
      <span class="cursor" aria-hidden="true">|</span>
    </div>

    <p class="hero__subtitle">
      {{ data.subtitle }}
    </p>

    <div class="hero__actions">
      <button class="btn-primary" (click)="scrollTo('contact')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Get in touch
      </button>

      <button class="btn-ghost" (click)="scrollTo('experience')">
        View my work
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

    <div class="hero__socials">
      @for (link of data.socialLinks; track link.name) {
        <a [href]="link.url" target="_blank" rel="noopener noreferrer" class="social-link" [attr.aria-label]="link.name">
          @if (link.icon === 'github') {
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
            </svg>
          }
          @if (link.icon === 'linkedin') {
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
              <rect x="2" y="9" width="4" height="12"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
          }
          @if (link.icon === 'mail') {
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          }
        </a>
      }
    </div>

  </div>

  <!-- Scroll indicator -->
  <div class="hero__scroll" (click)="scrollTo('about')">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>
